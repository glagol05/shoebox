spring.datasource.url=jdbc:postgresql://localhost:5432/shoebox
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Include error messages in the response
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=always

# Optional: verbose logging for web requests
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
